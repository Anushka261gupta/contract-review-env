name: contract-review-env
description: Contract analysis environment for AI agents
version: "1.0"

observation_space:
  type: object
  properties:
    clause:
      type: string

action_space:
  type: string
  enum:
    - mark_safe
    - mark_risky
    - skip
    - payment
    - termination
    - privacy
    - legal
    - suggest_edit

reward_range:
  min: -1
  max: 1

endpoints:
  reset: /reset
  step: /step
  state: /state
